<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKK Scoreboard</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preload" href="/assets/fonts/JetBrainsMono-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="/assets/fonts/Hey Comic.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/users.css">
</head>
<body class="users-page">
  <div class="grain"></div>
  <header class="site-header" data-scroll-header>
    <nav class="navbar" data-nav-root>
      <a class="brand" href="/dashboard" aria-label="MKK dashboard">MKK</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav-panel">
        <span class="nav-toggle__bars" aria-hidden="true"></span>
      </button>
      <div class="nav-panel" id="site-nav-panel">
        <div class="nav-links">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/challenges">Challenges</a>
          <a class="nav-link is-active" href="/scoreboard">Scoreboard</a>
          <a class="nav-link" href="/dashboard#rules">Rules</a>
          <a class="nav-link" href="/profile">Profile</a>
        </div>
        <div class="nav-meta">
          <div class="countdown-pill" data-countdown-pill>
            <span class="countdown-label">CTF ENDS IN</span>
            <span class="countdown-value" data-countdown>14:23:07</span>
          </div>
          <a class="user-chip" href="/profile"><span data-auth-username>player</span> <span>· <span data-auth-score>0</span> pts</span></a>
          <button class="power-button" type="button" aria-label="Logout" data-logout-button>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2v9"></path>
              <path d="M7.76 4.84A8 8 0 1 0 16.24 4.84"></path>
            </svg>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-shell">


    <!-- Scoreboard route now renders a live user-registry experience while keeping the existing route name. -->
    <section class="boot-log users-boot-sequence" aria-live="polite" data-users-boot>
      <p>&gt; querying user registry...</p>
      <p>&gt; <span data-users-boot-count>0</span> records found</p>
      <p>&gt; rendering identities...</p>
    </section>

    <!-- The podium highlights the top three loaded profiles above the full registry grid. -->
    <section class="users-podium reveal stagger-2" aria-labelledby="users-podium-heading">
      <div class="section-heading" id="users-podium-heading">TOP OPERATIVES</div>
      <div class="users-podium__grid" id="users-podium"></div>
    </section>

    <!-- Client-side controls filter the already-loaded registry without another round trip. -->
    <section class="glass-card users-toolbar reveal stagger-3" aria-label="Search and filter users">
      <label class="users-search" for="users-search-input">
        <span class="users-search__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20L16.65 16.65"></path>
          </svg>
        </span>
        <input id="users-search-input" type="search" placeholder="search hackers..." autocomplete="off">
      </label>
      <div class="users-filters" role="tablist" aria-label="User filters">
        <button class="users-filter is-active" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="users-filter" type="button" data-filter="active" aria-pressed="false">Active</button>
        <button class="users-filter" type="button" data-filter="top10" aria-pressed="false">Top 10</button>
      </div>
    </section>

    <!-- Infinite-scroll registry grid with loading, empty, and completion states. -->
    <section class="users-registry reveal stagger-4" aria-labelledby="users-grid-heading">
      <div class="section-heading" id="users-grid-heading">USER REGISTRY</div>
      <div class="users-grid" id="users-grid"></div>
      <div class="users-loading" id="users-loading" hidden aria-live="polite">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="users-end-state" id="users-end-state" hidden>
        <p>&gt; end of registry</p>
        <p>&gt; all <span data-users-end-count>0</span> identities loaded</p>
      </div>
      <div class="users-sentinel" id="users-sentinel" aria-hidden="true"></div>
    </section>

    <footer class="site-footer reveal stagger-9" id="rules">
      <p>MKK CTF 2026</p>
      <div class="glyph-line" aria-label="Skill Issue? written in Unown Pokemon Alphabet">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/S.png" alt="S">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/K.png" alt="K">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/I.png" alt="I">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/L.png" alt="L">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/L.png" alt="L">
        <span class="glyph-space" aria-hidden="true"></span>
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/I.png" alt="I">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/S.png" alt="S">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/S.png" alt="S">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/U.png" alt="U">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/E.png" alt="E">
        <img src="/assets/hieroglyphics/Unown Pokemon Alphabet/question_mark.png" alt="?">
      </div>
      <p>top of the game</p>
      <p>&copy; all rights reserved</p>
    </footer>
  </main>
  <script src="/js/countdown.js"></script>
  <script src="/js/countup.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/env.js"></script>
  <script type="module" src="/js/scoreboard-page.js"></script>
</body>
</html>
