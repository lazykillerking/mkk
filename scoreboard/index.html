<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKK Scoreboard</title>
  <!-- Shared assets keep this placeholder page visually aligned with the rest of the site. -->
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preload" href="/assets/fonts/JetBrainsMono-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="/assets/fonts/Hey Comic.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div class="grain"></div>
  <!-- Shared navigation shell; only the active tab changes page to page. -->
  <header class="site-header" data-scroll-header>
    <nav class="navbar" data-nav-root>
      <a class="brand" href="/dashboard" aria-label="MKK dashboard">MKK</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav-panel">
        <span class="nav-toggle__bars" aria-hidden="true"></span>
      </button>
      <div class="nav-panel" id="site-nav-panel">
        <div class="nav-links">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/challenges">Challenges</a>
          <a class="nav-link is-active" href="/scoreboard">Scoreboard</a>
          <a class="nav-link" href="/dashboard#rules">Rules</a>
          <a class="nav-link" href="/profile">Profile</a>
        </div>
        <div class="nav-meta">
          <a class="user-chip" href="/profile"><span data-auth-username>player</span> <span>· <span data-auth-score>0</span> pts</span></a>
          <button class="power-button" type="button" aria-label="Logout" data-logout-button>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2v9"></path>
              <path d="M7.76 4.84A8 8 0 1 0 16.24 4.84"></path>
            </svg>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <!-- Current implementation is intentionally a placeholder card for future expansion. -->
    <section class="glass-card standings-card reveal">
      <div class="section-heading">SCOREBOARD</div>
      <p>Scoreboard placeholder</p>
    </section>

    <!-- [2026-04-07] Standard site footer added to match dashboard, profile, and challenges pages.
         Glyph images are Hylian characters spelling GOODLUCK from assets/hieroglyphics/. -->
    <footer class="site-footer reveal" id="rules">
      <p>MKK CTF 2026</p>
      <div class="glyph-line" aria-label="GOODLUCK written in Hylian">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(71).png" alt="G">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(79).png" alt="O">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(79).png" alt="O">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(68).png" alt="D">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(76).png" alt="L">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(85).png" alt="U">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(67).png" alt="C">
        <img src="/assets/hieroglyphics/Hylian%20Language/char(75).png" alt="K">
      </div>
      <p>good luck</p>
      <p>&copy; all rights reserved</p>
    </footer>
  </main>
  <script src="/js/nav.js"></script>
  <script src="/js/env.js"></script>
  <script type="module" src="/js/scoreboard-page.js"></script>
</body>
</html>
