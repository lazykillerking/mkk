<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - MKK</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="preload" href="/assets/fonts/JetBrainsMono-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="/assets/fonts/Hey Comic.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div class="grain"></div>

  <!-- Shared header/navigation. -->
  <header class="site-header" data-scroll-header>
    <nav class="navbar" data-nav-root>
      <a class="brand" href="/dashboard">MKK</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav-panel">
        <span class="nav-toggle__bars" aria-hidden="true"></span>
      </button>
      <div class="nav-panel" id="site-nav-panel">
        <div class="nav-links">
          <a class="nav-link" href="/dashboard">Dashboard</a>
          <a class="nav-link" href="/challenges">Challenges</a>
          <a class="nav-link" href="/scoreboard">Scoreboard</a>
          <a class="nav-link" href="/dashboard#rules">Rules</a>
          <a class="nav-link is-active" href="/profile">Profile</a>
        </div>
        <div class="nav-meta">
          <a class="user-chip" href="/profile"><span data-auth-username>player</span> <span>· <span data-auth-score>0</span> pts</span></a>
          <button class="power-button" type="button" aria-label="Logout" data-logout-button>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2v9"></path>
              <path d="M7.76 4.84A8 8 0 1 0 16.24 4.84"></path>
            </svg>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <div style="max-width: 600px; margin: 4rem auto; padding: 0 1.5rem;">
      <section class="glass-card reveal stagger-1">
        <div class="section-heading" style="margin-bottom: 2rem;">EDIT PROFILE</div>
        <div id="edit-global-message" style="margin-bottom: 1rem; font-size: 0.9rem;" aria-live="polite"></div>
        
        <form id="edit-profile-form" class="auth-box__form">
          <div class="form-group">
            <label class="form-label" for="edit-username">Username <span style="opacity:0.5">(3-24 chars, a-z, 0-9, _)</span></label>
            <input class="form-input" id="edit-username" name="username" type="text" autocomplete="off" required>
            <div id="username-feedback" style="font-size: 0.8rem; height: 1.2rem; color: var(--amber-core); margin-top: 0.25rem;"></div>
          </div>

          <div class="form-group" style="display: flex; gap: 1rem;">
            <div style="flex: 1;">
              <label class="form-label" for="edit-first-name">First Name</label>
              <input class="form-input" id="edit-first-name" name="first_name" type="text" autocomplete="given-name">
            </div>
            <div style="flex: 1;">
              <label class="form-label" for="edit-last-name">Last Name</label>
              <input class="form-input" id="edit-last-name" name="last_name" type="text" autocomplete="family-name">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-country">Country</label>
            <select class="form-input" id="edit-country" name="country" style="appearance: none; background: rgba(0, 0, 0, 0.4);">
              <option value="">-- Select Country --</option>
              <option value="IN">India</option>
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-about">About <span id="about-counter" style="opacity:0.5; float:right;">0/300</span></label>
            <textarea class="form-input" id="edit-about" name="about" rows="3" maxlength="300" style="resize: vertical;"></textarea>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
            <a href="/profile" class="glass-card outline-button" style="text-decoration:none; padding: 0.75rem 1.5rem; color: var(--text-base); font-family:var(--font-mono); display:flex; align-items:center; justify-content:center;">Cancel</a>
            <button class="glass-card auth-button" id="edit-submit-button" type="submit" disabled style="padding: 0.75rem 1.5rem; transition: opacity 0.2s;">Save Changes</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/env.js"></script>
  <script type="module" src="/profile/edit/edit.js"></script>
</body>
</html>
